<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MumbleWumble</title>
    <link rel="stylesheet" href=".styling/style.css">
    <link rel="stylesheet" href=".styling/error.css">
</head>

<body>
    <div class="content">
        <p id="name">Word Game</p>

        <div class="title">
            <h1>Mumble</h1>
            <h1 id="green">Wumble</h1>
        </div>

        <p id="description">Type a word, then scramble or unscramble it instantly.</p>

        <div class="input-box">
            <input class="input" type="text" id="message" placeholder="Enter a message...">
            <input class="input" type="text" id="code_word" placeholder="Enter a code word">
        </div>

        <div class="main-buttons">
            <button id="scramble" type="button">Scramble</button>
            <button id="unscramble" type="button">Unscramble</button>
        </div>

            
    </div> 

    <div class="error-popup">
    <button id="close-button">X</button>

    <div class="error-message">
        <p id="messages"></p>
         <button id="ok-button">OK</button>
    </div>
</div>

<div id="blurry-screen">

</div>
    <script type="module" src="main.js"></script>
</body>

</html>
