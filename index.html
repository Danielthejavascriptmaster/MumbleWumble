<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MumbleWumble</title>
    <link rel="stylesheet" href="styling/style.css">
</head>
<body>
    <div class="content">
        <p id="name">Word Game</p>

        <h1>Mumble Wumble</h1>

        <p id="description">Type a word, then scramble or unscrabmle it instantly.</p>
        
        <input id="input" type="text" placeholder="Enter a word...">

            <div class="main-buttons">
                <button id="scramble">Scramble</button>
                <button id="unscramble">Unscramble</button>
            </div>

            <div class="extra-buttons">
                <button id="tutorial">Tutorial</button>
                <button id="credit">Credits</button>
            </div>
    </div> 
</body>
</html>
